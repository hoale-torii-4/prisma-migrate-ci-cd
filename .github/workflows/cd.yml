name: CD

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ALLOW_PROD_MIGRATE: ${{ secrets.ALLOW_PROD_MIGRATE }}
      NODE_ENV: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate migration secrets
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Missing secret DATABASE_URL"
            exit 1
          fi
          if [ "$ALLOW_PROD_MIGRATE" != "true" ]; then
            echo "Blocked: set ALLOW_PROD_MIGRATE=true to run production migrations"
            exit 1
          fi

      - name: Show migration status
        run: npm run prisma:migrate:status

      - name: Run safe production migration
        run: npm run migrate:safe

      - name: Deploy application
        run: |
          echo "Place your deploy command here (Docker, VM, Kubernetes, etc.)"
          echo "Migration is done before app rollout to avoid schema mismatch"
